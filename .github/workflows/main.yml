name: Run Local MySQL Data Load

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub

jobs:
  run-local-pipeline:
    runs-on: self-hosted # Tells GitHub to execute this on your Windows laptop

    steps:
    # Step 1: Pull the latest code from GitHub to your laptop
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Install required Python packages locally
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mysql-connector-python pandas

    # Step 3: Execute the script
    - name: Execute Python Pipeline
      run: python load_data.py
