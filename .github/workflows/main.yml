name: Run MySQL Data Load Pipeline

on:
  push:
    branches:
      - main  # Runs automatically when you push to main
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: self-hosted

    steps:
    # Step 1: Check out your repository code
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Step 3: Install database drivers and libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run the script passing the GitHub Secrets
    - name: Execute Python Pipeline
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: python data_loader.py
