name: Load CSV to Snowflake

on:
  push:
    branches:
      - main
    paths:
      
      - 'load_to_snowflake.py'
  workflow_dispatch:  # Manual trigger

jobs:
  load-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql cryptography
          pip install --no-cache-dir -r requirements.txt
      
      - name: Load CSV to Snowflake
        env:
          DATA_PATH: ${{ github.workspace }}/data/sample_data.csv
          
          
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_SCHEMA: ${{ secrets.MYSQL_SCHEMA }}
        run: python ${{ github.workspace }}/src/data_loader.py
                
      - name: Notify on Success
        if: success()
        run: echo "✓ Data loaded successfully to Snowflake"
      
      - name: Notify on Failure
        if: failure()
        run: echo "✗ Failed to load data"
